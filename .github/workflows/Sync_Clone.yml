name: Fork Filter lists

on:
  workflow_dispatch:
  schedule:
    - cron: "30 * * * *"
  
jobs:
  Fork-FLITER-list:
    runs-on: ubuntu-latest
    env:
      TZ: 'Asia/Shanghai'
    
    steps: 
    - name: Checkout target repository
      uses: actions/checkout@v4.1.0
      with:
        repository: axtyet/Quan-X
        path: Quan-X-repo

######

      # Fork Chxm1023
    - name: Fork Chxm1023/Rewrite
      run: |
        mkdir -p Quan-X-repo/chxm1023
        git clone -b main https://github.com/chxm1023/Rewrite.git  czy_Tmp
        cp -r czy_Tmp/* Quan-X-repo/chxm1023/Rewrite
        rm -rf czy_Tmp   
    - name: Edit Chxm1023/Rewrite
      run: |
        cd Quan-X-repo/chxm1023/Rewrite
        for file in *.js; do
            if [ "$file" ] ; then
              # 修改脚本链接
              sed -i 's/raw\.githubusercontent\.com\/chxm1023\/Rewrite\/main/raw.githubusercontent\.com\/axtyet\/Quan-X\/main\/chxm1023\/Rewrite/g' "$file"
            else
              echo "$file not found."
            fi
          done
      # 修改脚本链接
    - name: Edit Rewrite/Revenuecat
      run: |
        cd Quan-X-repo/chxm1023/Rewrite/Revenuecat
        for file in *.js; do
            if [ "$file" ] ; then
              # 修改脚本链接
              sed -i 's/raw\.githubusercontent\.com\/chxm1023\/Rewrite\/main\/Revenuecat/raw.githubusercontent\.com\/axtyet\/Quan-X\/main\/chxm1023\/Rewrite\/Revenuecat/g' "$file"
            else
              echo "$file not found."
            fi
          done
      # 修改脚本链接
    - name: Edit Rewrite/iTunes
      run: |
        cd Quan-X-repo/chxm1023/Rewrite/iTunes
        for file in *.js; do
            if [ "$file" ] ; then
              # 修改脚本链接
              sed -i 's/raw\.githubusercontent\.com\/chxm1023\/Rewrite\/main\/iTunes/raw.githubusercontent\.com\/axtyet\/Quan-X\/main\/chxm1023\/Rewrite\/iTunes/g' "$file"
            else
              echo "$file not found."
            fi
          done
          
    - name: Fork Chxm1023/Advertising
      run: |
        mkdir -p Quan-X-repo/chxm1023
        git clone -b main https://github.com/chxm1023/Advertising.git  cyz_Tmp
        cp -r cyz_Tmp/* Quan-X-repo/chxm1023/Advertising
        rm -rf cyz_Tmp
         # 修改脚本链接
    - name: Edit Advertising
      run: |
        cd Quan-X-repo/chxm1023/Advertising
        for file in *.js; do
            if [ "$file" ] ; then
              # 修改脚本链接
              sed -i 's/raw\.githubusercontent\.com\/chxm1023\/Advertising\/main/raw.githubusercontent\.com\/axtyet\/Quan-X\/main\/chxm1023\/Advertising/g' "$file"
            else
              echo "$file not found."
            fi
          done

    - name: Fork Chxm1023/Script_X
      run: |
        mkdir -p Quan-X-repo
        git clone -b main https://github.com/chxm1023/Script_X.git  yzc_Tmp
        cp -r yzc_Tmp/* Quan-X-repo/chxm1023/Script_X
        rm -rf yzc_Tmp   

        
    - name: Add and Commits
      run: |
        cd Quan-X-repo
         if [[ -n $(git status -s) ]]; then
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add .
          git commit -m "$(TZ='Asia/Shanghai' date +'%Y-%m-%d %H:%M')"
          git push origin HEAD
        else
          echo "No changes to commit."
        fi

    - name: Cleanup Workflow
      uses: Mattraks/delete-workflow-runs@main
      with:
        retain_days: 0
        keep_minimum_runs: 2
