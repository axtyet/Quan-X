name: Fork Filter lists

on:
  workflow_dispatch:
  schedule:
    - cron: "30 * * * *"
  
jobs:
  Fork-FLITER-list:
    runs-on: ubuntu-latest
    env:
      TZ: 'Asia/Shanghai'
    
    steps: 
    - name: Checkout target repository
      uses: actions/checkout@v4.1.0
      with:
        repository: axtyet/Quan-X
        path: Quan-X-repo

######

      # Fork Chxm1023
    - name: Fork Chxm1023/Rewrite
      run: |
        mkdir -p Quan-X-repo/chxm1023
        git clone -b main https://github.com/chxm1023/Rewrite.git  czy_Tmp
        cp -r czy_Tmp/* Quan-X-repo/chxm1023/Rewrite
        rm -rf czy_Tmp   
    - name: Edit Chxm1023/Rewrite
      run: |
        cd Quan-X-repo/chxm1023/Rewrite
        for file in *.js; do
            if [ "$file" ] ; then
              # 修改脚本链接
              sed -i 's/raw\.githubusercontent\.com\/chxm1023\/Rewrite\/main/raw.githubusercontent\.com\/axtyet\/Quan-X\/main\/chxm1023\/Rewrite/g' "$file"
            else
              echo "$file not found."
            fi
          done
      # 修改脚本链接
    - name: Edit Rewrite/Revenuecat
      run: |
        cd Quan-X-repo/chxm1023/Rewrite/Revenuecat
